<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>火属性ヒット数簡易計算ツール</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-soft: #f1f4f8;
      --text: #18202b;
      --muted: #647184;
      --line: #d8dee8;
      --accent: #d7472f;
      --accent-dark: #a92f20;
      --ok: #157a4a;
      --ng: #b3261e;
      --focus: #246bfe;
      --shadow: 0 8px 24px rgba(22, 33, 50, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    button,
    input,
    select {
      font: inherit;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
    }

    input:focus,
    select:focus {
      outline: 3px solid rgba(36, 107, 254, 0.18);
      border-color: var(--focus);
    }

    input[type="checkbox"] {
      width: 22px;
      height: 22px;
      min-height: 22px;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 14px;
    }

    .summary {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: 0 -14px 16px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(216, 222, 232, 0.88);
      background: rgba(246, 247, 249, 0.96);
      backdrop-filter: blur(10px);
    }

    .summary-main {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 14px;
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .summary-numbers {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .summary-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .total {
      font-size: clamp(34px, 10vw, 56px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0;
    }

    label.field span,
    .group-title,
    .small-label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .member-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: #fff7f5;
    }

    .member-header {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1 1 auto;
      min-width: 0;
    }

    .member-name {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
    }

    .recast-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 40px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
      font-weight: 700;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .member-total {
      flex: 0 0 auto;
      color: var(--accent-dark);
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
    }

    .card-body {
      display: grid;
      gap: 16px;
      padding: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .section {
      display: grid;
      gap: 10px;
      padding-top: 2px;
    }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .section-title {
      margin: 0;
      font-size: 16px;
    }

    .section-total {
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    .toggle-row {
      display: grid;
      grid-template-columns: 30px minmax(0, 1.3fr) minmax(88px, 0.7fr);
      gap: 8px;
      align-items: center;
      min-height: 56px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-soft);
    }

    .special-row {
      grid-template-columns: 30px minmax(0, 1.1fr) minmax(120px, 0.8fr) minmax(88px, 0.6fr) minmax(86px, 0.5fr);
    }

    .mini-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      color: var(--text);
      font-weight: 700;
    }

    .mini-toggle input {
      margin: 0;
    }

    .row-name {
      min-width: 0;
    }

    .row-name input {
      background: #fff;
    }

    .row-hit {
      min-width: 0;
    }

    .note {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .wide-card .card-header {
      background: #f5f8ff;
    }

    .utility-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 760px) {
      .app {
        padding: 20px;
      }

      .summary {
        margin: 0 -20px 20px;
        padding: 14px 20px;
      }

      .member-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .form-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .utility-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .card-header {
        align-items: flex-start;
      }

      .member-header {
        flex-wrap: wrap;
      }

      .member-name {
        flex-basis: 100%;
      }

      .toggle-row,
      .special-row {
        grid-template-columns: 30px minmax(0, 1fr);
      }

      .toggle-row .row-hit,
      .special-row .row-hit,
      .special-row .row-once,
      .special-row .row-condition {
        grid-column: 2;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="summary" aria-live="polite">
      <div class="summary-main">
        <div class="summary-label">現在</div>
        <div class="summary-numbers">
          <div class="total"><span id="totalHits">0</span> hits</div>
        </div>
      </div>
    </section>

    <div class="grid">
      <section id="members" class="member-grid" aria-label="メンバー別入力"></section>

      <section class="utility-grid" aria-label="召喚石とその他補正">
        <article class="card wide-card">
          <header class="card-header">
            <h2>召喚石</h2>
            <div class="member-total"><span id="summonTotal">0</span> hits</div>
          </header>
          <div class="card-body">
            <div id="summons" class="section"></div>
          </div>
        </article>

        <article class="card wide-card">
          <header class="card-header">
            <h2>その他補正</h2>
            <div class="member-total"><span id="adjustmentTotal">0</span> hits</div>
          </header>
          <div class="card-body">
            <div id="adjustments" class="section"></div>
          </div>
        </article>
      </section>

      <div class="section">
        <p class="note">
          補足: 追撃数は、通常攻撃・奥義の両方に適用します。例: 追撃数2の場合、本体1hit + 追撃2hit = 合計3hitとして扱います。
        </p>
        <p class="note">
          このツールはヒット数の簡易確認用です。ゲーム内仕様を完全再現するものではないため、特殊な追撃、追加行動、自動発動アビリティ、召喚効果、ターン終了時ダメージなどは必要に応じて手動で補正してください。
        </p>
      </div>
    </div>
  </main>

  <script>
    const defaultPreset = {
      members: [
        {
          name: "主人公",
          action: "奥義",
          mainHit: 1,
          echoCount: 0,
          ougiRecast: true,
          abilities: [
            { name: "1アビ（概算）", hit: 14, enabled: false },
            { name: "蛟", hit: 3, enabled: false },
            { name: "蛟×2", hit: 6, enabled: false },
            { name: "蛟×4", hit: 12, enabled: false }
          ],
          specials: [
            { name: "晩蝉：OC時10hit", condition: "手動", hit: 10, enabled: true, oncePerTurn: true },
            { name: "1アビ:奥義時1hit", condition: "手動", hit: 1, enabled: false, oncePerTurn: true },
            { name: "アトゥム：奥義時1hitアビ", condition: "奥義時", hit: 1, enabled: true, oncePerTurn: false }
          ]
        },
        {
          name: "さと",
          action: "奥義",
          mainHit: 1,
          echoCount: 0,
          ougiRecast: true,
          abilities: [
            { name: "1アビ", hit: 6, enabled: false },
            { name: "4-1アビ", hit: 4, enabled: false }
          ],
          specials: [
            { name: "火燐灯：奥義時6hit", condition: "奥義時", hit: 6, enabled: true, oncePerTurn: false },
            { name: "火燐灯：ノーダメ時6hit", condition: "手動", hit: 6, enabled: false, oncePerTurn: true },
            { name: "アトゥム：奥義時1hitアビ", condition: "奥義時", hit: 1, enabled: true, oncePerTurn: false }
          ]
        },
        {
          name: "サンチラ",
          action: "奥義",
          mainHit: 1,
          echoCount: 0,
          ougiRecast: true,
          abilities: [
            { name: "1アビ", hit: 1, enabled: true },
            { name: "1アビ", hit: 1, enabled: true }
          ],
          specials: [
            { name: "サポアビ：奥義時12hitアビ", condition: "奥義時", hit: 12, enabled: true, oncePerTurn: false },
            { name: "アトゥム：奥義時1hitアビ", condition: "奥義時", hit: 1, enabled: true, oncePerTurn: false }
          ]
        },
        {
          name: "アトゥム（起動後）",
          action: "奥義",
          mainHit: 1,
          echoCount: 0,
          ougiRecast: false,
          abilities: [
            { name: "1アビ", hit: 1, enabled: false },
          ],
          specials: [
            { name: "サポアビ：奥義時10hitアビ", condition: "奥義時", hit: 10, enabled: true, oncePerTurn: false },
            { name: "フェネクス：ターン終了時1hitアビ", condition: "ターン終了時", hit: 1, enabled: true, oncePerTurn: true }
          ]
        }
      ],
      summons: [
        { name: "基本", hit: 1, enabled: false },
        { name: "サン（TA×3,追撃1)", hit: 18, enabled: false },
        { name: "トリプルゼロ表", hit: 6, enabled: false }
      ],
      adjustments: [
        { name: "FC", hit: 1, enabled: false },
        { name: "調整用", hit: 0, enabled: false }
      ]
    };

    const actionOptions = [
      { value: "攻撃しない", label: "攻撃しない" },
      { value: "SA", label: "SA" },
      { value: "DA", label: "DA" },
      { value: "TA", label: "TA" },
      { value: "奥義", label: "奥義" }
    ];

    const specialConditions = ["常時", "通常攻撃時", "奥義時", "ターン終了時", "手動"];
    const multiAttackCount = { SA: 1, DA: 2, TA: 3 };
    const state = JSON.parse(JSON.stringify(defaultPreset));

    const el = {
      totalHits: document.getElementById("totalHits"),
      members: document.getElementById("members"),
      summons: document.getElementById("summons"),
      adjustments: document.getElementById("adjustments"),
      summonTotal: document.getElementById("summonTotal"),
      adjustmentTotal: document.getElementById("adjustmentTotal")
    };

    function normalizeNumber(value) {
      const number = Number(value);
      if (!Number.isFinite(number) || number < 0) {
        return 0;
      }
      return Math.round(number);
    }

    function makeOptions(options, selectedValue) {
      return options.map((option) => {
        const value = typeof option === "string" ? option : option.value;
        const label = typeof option === "string" ? option : option.label;
        const selected = value === selectedValue ? " selected" : "";
        return `<option value="${value}"${selected}>${label}</option>`;
      }).join("");
    }

    function isNormalAttack(action) {
      return action === "SA" || action === "DA" || action === "TA";
    }

    function calculateMainAction(member) {
      const echoMultiplier = 1 + normalizeNumber(member.echoCount);
      const mainHit = normalizeNumber(member.mainHit);

      if (isNormalAttack(member.action)) {
        return mainHit * multiAttackCount[member.action] * echoMultiplier;
      }

      if (member.action === "奥義") {
        return mainHit * echoMultiplier;
      }

      return 0;
    }

    function canAddSpecial(member, special) {
      if (!special.enabled) {
        return false;
      }

      if (special.condition === "通常攻撃時") {
        return isNormalAttack(member.action);
      }

      if (special.condition === "奥義時") {
        return member.action === "奥義";
      }

      return true;
    }

    function calculateMember(member) {
      const isOugiRecastActive = member.action === "奥義" && member.ougiRecast;
      const recastMultiplier = isOugiRecastActive ? 2 : 1;
      let recastTargetHits = calculateMainAction(member);
      let nonRecastHits = 0;
      let abilityHits = 0;
      let specialContribution = 0;

      member.abilities
        .filter((ability) => ability.enabled)
        .forEach((ability) => {
          const hits = normalizeNumber(ability.hit);
          abilityHits += hits;
        });

      member.specials
        .filter((special) => canAddSpecial(member, special))
        .forEach((special) => {
          const hits = normalizeNumber(special.hit);
          if (special.oncePerTurn) {
            nonRecastHits += hits;
            specialContribution += hits;
          } else {
            recastTargetHits += hits;
            specialContribution += hits * recastMultiplier;
          }
        });

      const main = calculateMainAction(member) * recastMultiplier;
      const total = recastTargetHits * recastMultiplier + nonRecastHits + abilityHits;

      return {
        main,
        abilities: abilityHits,
        specials: specialContribution,
        total
      };
    }

    function calculateToggleRows(rows) {
      return rows
        .filter((row) => row.enabled)
        .reduce((sum, row) => sum + normalizeNumber(row.hit), 0);
    }

    function renderMembers() {
      el.members.innerHTML = state.members.map((member, memberIndex) => `
        <article class="card" data-member="${memberIndex}">
          <header class="card-header">
            <div class="member-header">
              <input class="member-name" type="text" value="${member.name}" aria-label="メンバー名" data-path="members.${memberIndex}.name">
              <label class="recast-toggle">
                <input type="checkbox" ${member.ougiRecast ? "checked" : ""} data-path="members.${memberIndex}.ougiRecast">
                <span>奥義再発動</span>
              </label>
            </div>
            <div class="member-total"><span data-member-total="${memberIndex}">0</span> hits</div>
          </header>
          <div class="card-body">
            <div class="form-grid">
              <label class="field">
                <span>行動種別</span>
                <select data-path="members.${memberIndex}.action">
                  ${makeOptions(actionOptions, member.action)}
                </select>
              </label>
              <label class="field">
                <span>分割数</span>
                <input type="number" inputmode="numeric" min="0" step="1" value="${member.mainHit}" data-path="members.${memberIndex}.mainHit">
              </label>
              <label class="field">
                <span>追撃数</span>
                <input type="number" inputmode="numeric" min="0" step="1" value="${member.echoCount}" data-path="members.${memberIndex}.echoCount">
              </label>
            </div>

            <section class="section">
              <div class="section-head">
                <h3 class="section-title">アビリティ</h3>
                <div class="section-total"><span data-ability-total="${memberIndex}">0</span> hits</div>
              </div>
              ${member.abilities.map((ability, abilityIndex) => `
                <label class="toggle-row">
                  <input type="checkbox" ${ability.enabled ? "checked" : ""} data-path="members.${memberIndex}.abilities.${abilityIndex}.enabled">
                  <span class="row-name">
                    <span class="small-label">アビリティ名</span>
                    <input type="text" value="${ability.name}" data-path="members.${memberIndex}.abilities.${abilityIndex}.name">
                  </span>
                  <span class="row-hit">
                    <span class="small-label">ヒット数</span>
                    <input type="number" inputmode="numeric" min="0" step="1" value="${ability.hit}" data-path="members.${memberIndex}.abilities.${abilityIndex}.hit">
                  </span>
                </label>
              `).join("")}
            </section>

            <section class="section">
              <div class="section-head">
                <h3 class="section-title">特殊効果</h3>
                <div class="section-total"><span data-special-total="${memberIndex}">0</span> hits</div>
              </div>
              ${member.specials.map((special, specialIndex) => `
                <label class="toggle-row special-row">
                  <input type="checkbox" ${special.enabled ? "checked" : ""} data-path="members.${memberIndex}.specials.${specialIndex}.enabled">
                  <span class="row-name">
                    <span class="small-label">効果名</span>
                    <input type="text" value="${special.name}" data-path="members.${memberIndex}.specials.${specialIndex}.name">
                  </span>
                  <span class="row-condition">
                    <span class="small-label">発動条件</span>
                    <select data-path="members.${memberIndex}.specials.${specialIndex}.condition">
                      ${makeOptions(specialConditions, special.condition)}
                    </select>
                  </span>
                  <span class="row-hit">
                    <span class="small-label">ヒット数</span>
                    <input type="number" inputmode="numeric" min="0" step="1" value="${special.hit}" data-path="members.${memberIndex}.specials.${specialIndex}.hit">
                  </span>
                  <span class="row-once mini-toggle">
                    <input type="checkbox" ${special.oncePerTurn ? "checked" : ""} data-path="members.${memberIndex}.specials.${specialIndex}.oncePerTurn">
                    <span>ターン1</span>
                  </span>
                </label>
              `).join("")}
            </section>
          </div>
        </article>
      `).join("");
    }

    function renderToggleList(container, rows, type) {
      container.innerHTML = rows.map((row, rowIndex) => `
        <label class="toggle-row">
          <input type="checkbox" ${row.enabled ? "checked" : ""} data-path="${type}.${rowIndex}.enabled">
          <span class="row-name">
            <span class="small-label">${type === "summons" ? "召喚石名" : "補正名"}</span>
            <input type="text" value="${row.name}" data-path="${type}.${rowIndex}.name">
          </span>
          <span class="row-hit">
            <span class="small-label">ヒット数</span>
            <input type="number" inputmode="numeric" min="0" step="1" value="${row.hit}" data-path="${type}.${rowIndex}.hit">
          </span>
        </label>
      `).join("");
    }

    function setPathValue(path, value) {
      const keys = path.split(".");
      let target = state;
      while (keys.length > 1) {
        target = target[keys.shift()];
      }
      target[keys[0]] = value;
    }

    function handleInput(event) {
      const control = event.target;
      if (!control.dataset.path) {
        return;
      }

      let value = control.type === "checkbox" ? control.checked : control.value;
      if (control.type === "number") {
        value = normalizeNumber(control.value);
        control.value = value;
      }

      setPathValue(control.dataset.path, value);

      calculateAndRender();
    }

    function calculateAndRender() {
      const memberTotals = state.members.map(calculateMember);
      const memberSum = memberTotals.reduce((sum, member) => sum + member.total, 0);
      const summonTotal = calculateToggleRows(state.summons);
      const adjustmentTotal = calculateToggleRows(state.adjustments);
      const total = memberSum + summonTotal + adjustmentTotal;

      memberTotals.forEach((member, index) => {
        document.querySelector(`[data-member-total="${index}"]`).textContent = member.total;
        document.querySelector(`[data-ability-total="${index}"]`).textContent = member.abilities;
        document.querySelector(`[data-special-total="${index}"]`).textContent = member.specials;
      });

      el.summonTotal.textContent = summonTotal;
      el.adjustmentTotal.textContent = adjustmentTotal;
      el.totalHits.textContent = total;
    }

    function init() {
      renderMembers();
      renderToggleList(el.summons, state.summons, "summons");
      renderToggleList(el.adjustments, state.adjustments, "adjustments");

      document.body.addEventListener("input", handleInput);
      document.body.addEventListener("change", handleInput);
      calculateAndRender();
    }

    init();
  </script>
</body>
</html>
